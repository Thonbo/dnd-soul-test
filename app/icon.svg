<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="31" fill="#0d0906" stroke="#c8a96e" stroke-width="2"/>
  <!-- Outer mirror frame -->
  <ellipse cx="32" cy="28" rx="18" ry="20" fill="none" stroke="#c8a96e" stroke-width="2.5"/>
  <!-- Inner mirror glass -->
  <ellipse cx="32" cy="28" rx="14" ry="16" fill="#1a1008"/>
  <!-- Mirror shine -->
  <ellipse cx="28" cy="23" rx="6" ry="8" fill="#c8a96e" opacity="0.12"/>
  <ellipse cx="26" cy="21" rx="3" ry="4.5" fill="#c8a96e" opacity="0.18"/>
  <!-- Eye in the mirror - the Oracle -->
  <ellipse cx="32" cy="28" rx="8" ry="5" fill="none" stroke="#c8a96e" stroke-width="1.2"/>
  <circle cx="32" cy="28" r="3.2" fill="#c8a96e"/>
  <circle cx="32" cy="28" r="1.5" fill="#0d0906"/>
  <circle cx="33" cy="27" r="0.7" fill="#f0ddb0"/>
  <!-- Mirror handle -->
  <rect x="29.5" y="48" width="5" height="10" rx="1.5" fill="#c8a96e"/>
  <rect x="27" y="46" width="10" height="4" rx="2" fill="#c8a96e"/>
  <!-- Small decorative dots on frame -->
  <circle cx="32" cy="7" r="1.2" fill="#c8a96e"/>
  <circle cx="22" cy="10" r="0.9" fill="#c8a96e" opacity="0.7"/>
  <circle cx="42" cy="10" r="0.9" fill="#c8a96e" opacity="0.7"/>
</svg>
